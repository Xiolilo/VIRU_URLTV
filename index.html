<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rotador IPESA</title>
</head>

<body style="margin:0; background:black; overflow:hidden;">

<div id="contenedor" style="width:100%; height:100vh;"></div>

<!-- Punto invisible anti-reposo -->
<div id="antiReposo" 
     style="position:absolute; width:2px; height:2px; background:black; top:0; left:0;">
</div>

<script>

let rotador = [
  { titulo: "FACTURACIÓN JD", src: "FACT_JD.jpg" },
  { titulo: "FACTURACIÓN WIRTGEN", src: "FACT_WIR.jpg" },

  { titulo: "AGENDA MAQUINARIA", src: "AGENDA_VIR.jpg" },

  { titulo: "INDICADOR PRODUCTIVIDAD", src: "IND_PROD.jpg" },
  { titulo: "FLYER JP", src: "FLYER_JP.jpeg" },
  { titulo: "REGLAS ASESOR DE SERVICIOS", src: "300126_IPESA_CUADRO Reglas Asesor de Servicios (1)_page-0001.jpg" },

  { titulo: "ASESOR JUNIO", src: "Asesor-JUN.jpg" },
  { titulo: "TÉCNICO JUNIO", src: "Técnico-JUN.jpg" },
  { titulo: "MASTER SALES", src: "MASTERSALES.jpg" },
  { titulo: "MASTER TEC", src: "MASTERTEC.jpg" },
  
];

let i = 0;

function rotar() {
  const contenedor = document.getElementById("contenedor");
  const actual = rotador[i];

  contenedor.innerHTML = `
    <div style="width:100%; height:100%; display:flex; flex-direction:column; background:black;">
      <div style="color:white; font-size:26px; font-weight:bold; padding:12px 20px; font-family:Arial;">
        ${actual.titulo}
      </div>
      <img 
        src="${actual.src}" 
        style="width:100%; height:100%; object-fit:contain; background:black;">
    </div>
  `;

  i = (i + 1) % rotador.length;
}

rotar();
setInterval(rotar, 25000);

/* ===== SISTEMA ANTI REPOSO ===== */
let mover = 0;

setInterval(() => {
  const anti = document.getElementById("antiReposo");
  mover = (mover + 1) % 2;
  anti.style.transform = `translateX(${mover}px)`;
}, 10000);

</script>

</body>
</html>
